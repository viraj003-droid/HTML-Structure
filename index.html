<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dwarkesh Enterprise</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f7fb;
    text-align: center;
}

/* NAVBAR */
.navbar {
    background: #4F46E5;
    color: white;
    padding: 15px;
}

.nav-links {
    list-style: none;
    margin-top: 10px;
}

.nav-links li {
    display: inline;
    margin: 0 10px;
}

/* HERO */
.hero {
    padding: 40px 20px;
}

.hero h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.hero button {
    padding: 10px 20px;
    background: #4F46E5;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* PRODUCTS */
.products {
    padding: 40px 20px;
}

.product-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
}

.product-card {
    width: 220px;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.product-card img {
    width: 100%;
}

.price {
    font-weight: bold;
    margin: 10px 0;
}

.product-card button {
    padding: 8px 15px;
    background: #111827;
    color: white;
    border: none;
    border-radius: 6px;
}

/* FOOTER */
footer {
    background: #111827;
    color: white;
    padding: 20px;
    margin-top: 30px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2>DE Shoes</h2>
    <ul class="nav-links">
        <li>Home</li>
        <li>Products</li>
        <li>Contact</li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Dwarkesh Enterprise</h1>
    <p>Best quality shoes at best price</p>
    <a href="tel:9909788892">
        <button>Call Now: 9909788892</button>
    </a>
</section>

<!-- PRODUCTS -->
<section class="products">
    <h2>Our Products</h2>

    <div class="product-grid">

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400">
            <h3>Red Shoes</h3>
            <p class="price">₹1499</p>
            <button>Buy Now</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400">
            <h3>White Sneakers</h3>
            <p class="price">₹1799</p>
            <button>Buy Now</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400">
            <h3>Black Shoes</h3>
            <p class="price">₹1999</p>
            <button>Buy Now</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1608256246200-53e8b47b2f80?w=400">
            <h3>Sports Shoes</h3>
            <p class="price">₹1599</p>
            <button>Buy Now</button>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Dwarkesh Enterprise</p>
    <p>Email: desaiviraj003@gmail.com</p>
    <p>Phone: 9909788892</p>
</footer>

</body>
</html>
